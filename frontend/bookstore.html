<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
<title>Bookstore</title>
</head>

<body>

<nav>
  <h2>EduLearn</h2>
  <ul>
    <li><a href="homepage.html">Home</a></li>
    <li><a href="courses.html">Courses</a></li>
    <li><a href="forum.html">Forum</a></li>
    <li><a href="bookstore.html">Bookstore</a></li>
    <li><a href="login.html">Login</a></li>
    <li><a href="signup.html">Sign Up</a></li>
    <li>
      <a href="purchases.html">
        Cart <span id="cartCount" class="badge">0</span>
      </a>
    </li>
  </ul>
</nav>

<div class="container">

<h2>Bookstore</h2>

<div class="course-controls">

  <input type="text" id="bookSearch" placeholder="Search books..." class="search-box">

  <div class="filter-container">
    <button id="bookFilterToggle">All ⏷</button>

    <div class="filter-dropdown" id="bookFilterMenu" style="display:none;">
      <button data-category="all">All</button>
      <button data-category="ai">AI</button>
      <button data-category="db">Database</button>
    </div>
  </div>

</div>

<div class="grid" id="bookList">

  <div class="card" data-category="ai">
    <img src="images/book1.jpg">
    <h3>Machine Learning</h3>
    <p>$29</p>
    <button onclick="addToCart('Machine Learning', 29)">Add to Cart</button>

  <div class="card" data-category="db">
    <img src="images/book2.jpg">
    <h3>Database Systems</h3>
    <p>$25</p>
    <button onclick="addToCart('Database Systems', 25)">Add to Cart</button>
  </div>

</div>

</div>

<script src="js/script.js"></script>
</body>
</html>
