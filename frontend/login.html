<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>EduLearn | Login</title>
</head>
<body>

<nav>
  <div class="logo-container">
    <img src="images/The_Logo_of_the_University_of_Technology_Sarawak.png" alt="UTS Logo" class="logo-img">
    <h2>EduLearn</h2>
  </div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="courses.html">Courses</a></li>
    <li><a href="forum.html">Forum</a></li>
    <li><a href="bookstore.html">Bookstore</a></li>
  </ul>
  <div class="nav-actions">
    <a href="purchases.html" class="cart-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><span class="badge" id="cartCount">0</span>
    </a>
    <a href="login.html" class="btn">Login</a>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p>Sign in to continue learning</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn btn-block" style="padding: 12px; font-size: 16px;">Sign In</button>
      <div id="loginMessage" style="margin-top: 12px; text-align: center; font-size: 14px; font-weight: 500;"></div>
    </form>
    
    <div class="auth-links">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
    
    <div class="auth-demo-text">
      This is a demo portal. Login with any email to continue.
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
